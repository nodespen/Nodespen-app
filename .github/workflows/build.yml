name: Build Nodespen

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4

      - name: Generate platform projects
        run: |
          cd /tmp
          flutter create --project-name nodespen --org com.nodespen nodespen_platform
          cp -r /tmp/nodespen_platform/android $GITHUB_WORKSPACE/
          cp -r /tmp/nodespen_platform/ios $GITHUB_WORKSPACE/ 2>/dev/null || true
          cp -r /tmp/nodespen_platform/web $GITHUB_WORKSPACE/ 2>/dev/null || true
          cp -r /tmp/nodespen_platform/linux $GITHUB_WORKSPACE/ 2>/dev/null || true
          rm -f /tmp/nodespen_platform/test/widget_test.dart
          rm -rf $GITHUB_WORKSPACE/test 2>/dev/null; mkdir -p $GITHUB_WORKSPACE/test

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Analyze code
        shell: bash
        run: |
          flutter analyze 2>&1 | tee analysis_log.txt
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "=== ANALYSIS ERRORS ==="
            grep "error" analysis_log.txt | head -50
            exit $exit_code
          fi

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-logs
          path: analysis_log.txt

      - name: Build APK (Android)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nodespen-android
          path: build/app/outputs/flutter-apk/*.apk

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: nodespen-web
          path: build/web

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libgtk-3-dev liblzma-dev 2>/dev/null || true

      - name: Build Linux
        run: flutter build linux --release 2>/dev/null || echo "Linux build skipped (deps not available)"

      - name: Upload Linux
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nodespen-linux
          path: build/linux/x64/release/bundle
