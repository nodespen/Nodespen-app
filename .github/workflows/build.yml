name: Build Nodespen

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4

      - name: Generate platform projects
        run: |
          cd /tmp
          flutter create --project-name nodespen --org com.nodespen nodespen_platform
          cp -r /tmp/nodespen_platform/android $GITHUB_WORKSPACE/
          cp -r /tmp/nodespen_platform/ios $GITHUB_WORKSPACE/ 2>/dev/null || true
          cp -r /tmp/nodespen_platform/web $GITHUB_WORKSPACE/ 2>/dev/null || true
          cp -r /tmp/nodespen_platform/linux $GITHUB_WORKSPACE/ 2>/dev/null || true
          cp -r /tmp/nodespen_platform/test $GITHUB_WORKSPACE/test_generated 2>/dev/null || true
          cp /tmp/nodespen_platform/analysis_options.yaml $GITHUB_WORKSPACE/ 2>/dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build APK (Android)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nodespen-android
          path: build/app/outputs/flutter-apk/*.apk

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: nodespen-web
          path: build/web

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: nodespen-linux
          path: build/linux/x64/release/bundle
