name: Build Nodespen

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build APK (Android)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nodespen-android
          path: build/app/outputs/flutter-apk/*.apk

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: nodespen-web
          path: build/web

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: nodespen-linux
          path: build/linux/x64/release/bundle
