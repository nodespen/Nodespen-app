name: nodespen
description: La app de animación definitiva - Dibujo, Nodos y Gacha en una sola herramienta.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  uuid: ^4.2.1
  vector_math: ^2.1.4
  json_annotation: ^4.8.1
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/default_content/
  fonts:
    - family: Nodespen
      fonts:
        - asset: assets/fonts/Nodespen-Regular.ttf
